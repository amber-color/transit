<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>移動時間カレンダー</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Segoe UI', sans-serif; }
    .fc .fc-timegrid-slot { height: 2.75rem; }
    .fc .fc-timegrid-slot-label { font-size: 0.75rem; color: #6b7280; }
    .fc-event-main { padding: 2px 4px; font-size: 0.75rem; }
    .fc .fc-toolbar { display: none; }
    .fc-event { border: none !important; border-radius: 4px !important; }
    .fc .fc-col-header-cell { display: none; }
    .fc .fc-timegrid-divider { display: none; }
    #calendar-wrap { background: white; }
  </style>
</head>
<body class="bg-gray-100 flex flex-col lg:h-screen lg:overflow-hidden">

<!-- Loading toast (fixed, doesn't affect layout) -->
<div id="loading-indicator" style="display:none;position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);z-index:100;background:#6366f1;color:#fff;padding:0.4rem 0.9rem;border-radius:9999px;font-size:0.75rem;font-weight:500;align-items:center;gap:0.4rem;box-shadow:0 2px 8px rgba(0,0,0,0.2);white-space:nowrap;">
  <svg style="width:0.85rem;height:0.85rem;animation:spin 1s linear infinite;flex-shrink:0" fill="none" viewBox="0 0 24 24">
    <circle style="opacity:.3" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
    <path style="opacity:.9" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
  </svg>
  計算中...
</div>
<style>@keyframes spin { to { transform: rotate(360deg) } }</style>

<!-- Header -->
<header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-4 flex-shrink-0 shadow-sm">
  <div class="flex items-center gap-2">
    <span class="text-xl">🚃</span>
    <h1 class="text-base font-bold text-gray-900">移動時間カレンダー</h1>
  </div>
  <div class="flex items-center gap-2 ml-4">
    <button onclick="changeDate(-1)" class="px-2 py-1 text-gray-500 hover:text-gray-800 hover:bg-gray-100 rounded text-sm">‹</button>
    <input type="date" id="date-input" class="border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
    <button onclick="changeDate(1)" class="px-2 py-1 text-gray-500 hover:text-gray-800 hover:bg-gray-100 rounded text-sm">›</button>
    <button onclick="gotoToday()" class="px-2 py-1 text-xs text-gray-500 hover:text-gray-800 hover:bg-gray-100 rounded border border-gray-300">今日</button>
  </div>
</header>

<!-- Main layout -->
<div class="flex flex-col lg:flex-row flex-1 lg:overflow-hidden">

  <!-- Left Sidebar -->
  <aside class="w-full lg:w-80 bg-white border-b lg:border-b-0 lg:border-r border-gray-200 flex flex-col flex-shrink-0">
    <!-- Day start -->
    <div class="p-4 border-b border-gray-100">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-semibold text-gray-500 uppercase tracking-wide">スタート地点</span>
        <button onclick="openDayStartModal()" class="text-xs text-indigo-600 hover:text-indigo-800">編集</button>
      </div>
      <div id="day-start-display" class="text-sm text-gray-700">
        <span class="text-gray-400 italic">未設定</span>
      </div>
    </div>

    <!-- Event list -->
    <div class="lg:flex-1 lg:overflow-y-auto p-3 space-y-2" id="event-list">
      <div id="empty-hint" class="text-center text-xs text-gray-400 py-6">予定がありません</div>
    </div>

    <!-- Add button -->
    <div class="p-3 border-t border-gray-100">
      <button onclick="openAddModal()"
        class="w-full py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700 transition-colors font-medium">
        ＋ 予定を追加
      </button>
    </div>
  </aside>

  <!-- Right: calendar + warnings -->
  <main class="flex-1 overflow-y-auto flex flex-col min-w-0">
    <!-- Warnings -->
    <div id="warnings-container" style="display:none" class="space-y-1.5 p-3 pb-0"></div>

    <!-- Calendar -->
    <div id="calendar-wrap" class="flex-1">
      <div id="calendar"></div>
    </div>

    <!-- Legend -->
    <div class="flex gap-4 text-xs text-gray-500 px-3 py-2 border-t border-gray-100">
      <div class="flex items-center gap-1.5">
        <div class="w-3 h-3 rounded" style="background:#6366f1"></div>
        <span>予定</span>
      </div>
      <div class="flex items-center gap-1.5">
        <div class="w-3 h-3 rounded" style="background:#9ca3af"></div>
        <span>移動中（自動）</span>
      </div>
      <div class="flex items-center gap-1.5">
        <div class="w-3 h-3 rounded" style="background:#ef4444"></div>
        <span>時間が足りない</span>
      </div>
    </div>
  </main>
</div>

<!-- ===== Event Modal ===== -->
<div id="event-modal" style="display:none;position:fixed;inset:0;z-index:50;align-items:flex-start;justify-content:center;padding:1rem;padding-top:max(1rem,env(safe-area-inset-top));background:rgba(0,0,0,0.5);overflow-y:auto;">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-md" style="margin:auto;">
    <div class="flex items-center justify-between px-5 py-4 border-b">
      <h2 id="modal-title" class="text-base font-semibold text-gray-800">予定を追加</h2>
      <button onclick="closeEventModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">×</button>
    </div>
    <div id="modal-error" style="display:none" class="mx-5 mt-3 bg-red-50 text-red-700 text-sm px-3 py-2 rounded-lg"></div>
    <div class="px-5 py-4 space-y-4">
      <!-- Name -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">予定名</label>
        <input id="modal-name" type="text" placeholder="例：渋谷ミーティング"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
      <!-- Location -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">場所</label>
        <input id="modal-location" type="text" placeholder="例：渋谷駅、東京タワー"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
      <!-- Type -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-2">タイプ</label>
        <div class="grid grid-cols-3 gap-2">
          <label class="type-btn cursor-pointer">
            <input type="radio" name="event-type" value="fixed_arrival" class="sr-only" onchange="onTypeChange()">
            <div class="type-btn-box border-2 border-gray-200 rounded-lg p-2 text-center text-xs transition-colors">
              <div class="text-base mb-0.5">🕐</div>
              <div class="font-medium text-gray-700">到着時刻固定</div>
              <div class="text-gray-400 text-xs mt-0.5">指定時刻に到着</div>
            </div>
          </label>
          <label class="type-btn cursor-pointer">
            <input type="radio" name="event-type" value="fixed_duration" class="sr-only" onchange="onTypeChange()">
            <div class="type-btn-box border-2 border-gray-200 rounded-lg p-2 text-center text-xs transition-colors">
              <div class="text-base mb-0.5">⏱</div>
              <div class="font-medium text-gray-700">滞在時間固定</div>
              <div class="text-gray-400 text-xs mt-0.5">指定時間滞在</div>
            </div>
          </label>
          <label class="type-btn cursor-pointer">
            <input type="radio" name="event-type" value="fixed_departure" class="sr-only" onchange="onTypeChange()">
            <div class="type-btn-box border-2 border-gray-200 rounded-lg p-2 text-center text-xs transition-colors">
              <div class="text-base mb-0.5">🚀</div>
              <div class="font-medium text-gray-700">出発時刻固定</div>
              <div class="text-gray-400 text-xs mt-0.5">指定時刻に出発</div>
            </div>
          </label>
        </div>
      </div>
      <!-- Conditional fields -->
      <div id="field-arrival" style="display:none">
        <label class="block text-xs font-medium text-gray-600 mb-1">到着時刻</label>
        <input id="modal-arrival-time" type="time"
          class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
      <div id="field-stay" style="display:none">
        <label class="block text-xs font-medium text-gray-600 mb-1">滞在時間（分）</label>
        <input id="modal-stay-minutes" type="number" min="1" max="1440" placeholder="60"
          class="w-32 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
      <div id="field-departure" style="display:none">
        <label class="block text-xs font-medium text-gray-600 mb-1">出発時刻</label>
        <input id="modal-departure-time" type="time"
          class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
    </div>
    <div id="modal-footer-normal" class="flex justify-between px-5 py-4 border-t">
      <button id="modal-delete-btn" onclick="confirmDelete()" style="display:none" class="px-3 py-2 text-sm text-red-600 hover:text-red-800">削除</button>
      <div class="flex gap-2 ml-auto">
        <button onclick="closeEventModal()" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">キャンセル</button>
        <button onclick="saveEventModal()" class="px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700">保存</button>
      </div>
    </div>
    <div id="modal-footer-confirm" style="display:none" class="flex items-center justify-between px-5 py-4 border-t bg-red-50">
      <span class="text-sm text-red-700">本当に削除しますか？</span>
      <div class="flex gap-2">
        <button onclick="cancelDelete()" class="px-3 py-2 text-sm text-gray-600 hover:text-gray-800">キャンセル</button>
        <button onclick="deleteCurrentEvent()" class="px-4 py-2 bg-red-600 text-white text-sm rounded-lg hover:bg-red-700">削除する</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== Journey Detail Modal ===== -->
<div id="journey-modal" style="display:none;position:fixed;inset:0;z-index:50;align-items:flex-start;justify-content:center;padding:1rem;background:rgba(0,0,0,0.5);overflow-y:auto;">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-sm" style="margin:auto;">
    <div class="flex items-center justify-between px-5 py-4 border-b">
      <div>
        <h2 class="text-base font-semibold text-gray-800">🚃 移動の詳細</h2>
        <p id="journey-route" class="text-xs text-gray-500 mt-0.5"></p>
      </div>
      <button onclick="closeJourneyModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none ml-4">×</button>
    </div>
    <div id="journey-content" class="px-5 py-4"></div>
  </div>
</div>

<!-- ===== Day Start Modal ===== -->
<div id="daystart-modal" style="display:none;position:fixed;inset:0;z-index:50;align-items:center;justify-content:center;padding:1rem;background:rgba(0,0,0,0.5)">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-sm">
    <div class="flex items-center justify-between px-5 py-4 border-b">
      <h2 class="text-base font-semibold text-gray-800">🏠 スタート地点</h2>
      <button onclick="closeDayStartModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">×</button>
    </div>
    <div class="px-5 py-4 space-y-4">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">出発地</label>
        <input id="ds-location" type="text" placeholder="例：自宅、渋谷駅"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">出発時刻</label>
        <input id="ds-time" type="time"
          class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
    </div>
    <div class="flex justify-end gap-2 px-5 py-4 border-t">
      <button onclick="closeDayStartModal()" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">キャンセル</button>
      <button onclick="saveDayStart()" class="px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700">保存</button>
    </div>
  </div>
</div>

<script>
// ─── Constants ───────────────────────────────────────────────────
const NOMINATIM = 'https://nominatim.openstreetmap.org/search';
const TRANSIT_API = 'https://api.transit.ls8h.com/api/v1/plan';
const STORAGE_KEY = 'transitScheduleV2';

// ─── Caches & rate-limit queue ───────────────────────────────────
const geoCache = new Map();
const transitCache = new Map();
let geoQueue = Promise.resolve();

// ─── State ───────────────────────────────────────────────────────
let state = {
  selectedDate: getToday(),
  dayStart: { location: '', time: '09:00' },
  events: [],
};
let editingEventId = null;
let recomputeTimer = null;
let calendar = null;

// ─── Persistence ─────────────────────────────────────────────────
function getToday() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      state.dayStart = saved.dayStart || state.dayStart;
      state.events = saved.events || [];
      // Keep selectedDate as today on page load
    }
  } catch (e) {}
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    dayStart: state.dayStart,
    events: state.events,
  }));
}

// ─── Geocoding ───────────────────────────────────────────────────
function geocode(location) {
  if (!location) return Promise.resolve(null);
  if (geoCache.has(location)) return Promise.resolve(geoCache.get(location));
  return new Promise(resolve => {
    geoQueue = geoQueue.then(async () => {
      try {
        const res = await fetch(
          `${NOMINATIM}?q=${encodeURIComponent(location)}&format=json&limit=1&accept-language=ja&countrycodes=jp`,
          { headers: { 'Accept-Language': 'ja' } }
        );
        const data = await res.json();
        const result = data[0] ? { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) } : null;
        geoCache.set(location, result);
        resolve(result);
      } catch (e) {
        geoCache.set(location, null);
        resolve(null);
      }
      await new Promise(r => setTimeout(r, 1100));
    });
  });
}

// ─── Transit API ─────────────────────────────────────────────────
async function fetchTransitDetails(from, to) {
  const key = `${from.lat.toFixed(4)},${from.lon.toFixed(4)}__${to.lat.toFixed(4)},${to.lon.toFixed(4)}`;
  if (transitCache.has(key)) return transitCache.get(key);
  try {
    const res = await fetch(
      `${TRANSIT_API}?from=geo:${from.lat},${from.lon}&to=geo:${to.lat},${to.lon}`
    );
    const data = await res.json();
    const journeys = data.journeys || [];
    const transitJourneys = journeys.filter(j => j.legs && j.legs.some(l => l.kind === 'transit'));
    const pool = transitJourneys.length > 0 ? transitJourneys : journeys;
    if (pool.length === 0) { transitCache.set(key, null); return null; }
    const best = pool.reduce((a, b) => a.durationSecs <= b.durationSecs ? a : b);
    const result = { minutes: Math.ceil(best.durationSecs / 60), legs: best.legs || [] };
    transitCache.set(key, result);
    return result;
  } catch (e) {
    transitCache.set(key, null);
    return null;
  }
}

// ─── Date helpers ─────────────────────────────────────────────────
function dateTimeMs(dateStr, timeStr) {
  const [y, mo, d] = dateStr.split('-').map(Number);
  const [h, m] = timeStr.split(':').map(Number);
  return new Date(y, mo - 1, d, h, m).getTime();
}

function toIsoLocal(ms) {
  const d = new Date(ms);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:00`;
}

function fmtTime(ms) {
  const d = new Date(ms);
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

// ─── Schedule computation ─────────────────────────────────────────
async function computeSchedule() {
  if (!state.dayStart.location || !state.dayStart.time) return { calEvents: [], warnings: [] };

  const dateStr = state.selectedDate;
  const calEvents = [];
  const warnings = [];

  let currentMs = dateTimeMs(dateStr, state.dayStart.time);
  let currentLocation = state.dayStart.location;

  for (const event of state.events) {
    if (!event.location) continue;

    const [fromGeo, toGeo] = await Promise.all([
      geocode(currentLocation),
      geocode(event.location),
    ]);

    let travelMin = 0;
    let travelKnown = false;
    let travelLegs = [];
    if (fromGeo && toGeo) {
      const details = await fetchTransitDetails(fromGeo, toGeo);
      if (details !== null) { travelMin = details.minutes; travelKnown = true; travelLegs = details.legs; }
    }

    const travelStartMs = currentMs;
    const travelEndMs = currentMs + travelMin * 60000;
    let eventStartMs, eventEndMs;
    let hasWarning = false;
    let warningMsg = null;

    const travelProps = {
      isTravel: true,
      travelMin,
      travelKnown,
      fromLocation: currentLocation,
      toLocation: event.location,
      legs: travelLegs,
    };

    if (event.type === 'fixed_arrival') {
      const arrivalMs = dateTimeMs(dateStr, event.arrivalTime);
      if (travelEndMs > arrivalMs) {
        hasWarning = true;
        warningMsg = `「${event.name || event.location}」への移動時間が足りません（必要：${travelMin}分、余裕：${Math.round((arrivalMs - travelStartMs) / 60000)}分）`;
      }
      const travelDisplayEnd = Math.max(travelEndMs, arrivalMs);
      if (travelMin > 0 || !travelKnown) {
        calEvents.push({
          id: `travel-${event.id}`,
          title: travelKnown ? `🚃 移動中 ${travelMin}分` : '🚃 移動中',
          start: toIsoLocal(travelStartMs),
          end: toIsoLocal(travelDisplayEnd),
          backgroundColor: hasWarning ? '#ef4444' : '#9ca3af',
          borderColor: 'transparent',
          textColor: '#fff',
          extendedProps: { ...travelProps, warning: hasWarning },
        });
      }
      eventStartMs = arrivalMs;
      eventEndMs = arrivalMs + (event.stayMinutes || 0) * 60000;
    } else if (event.type === 'fixed_duration') {
      if (travelMin > 0 || !travelKnown) {
        calEvents.push({
          id: `travel-${event.id}`,
          title: travelKnown ? `🚃 移動中 ${travelMin}分` : '🚃 移動中',
          start: toIsoLocal(travelStartMs),
          end: toIsoLocal(travelEndMs),
          backgroundColor: '#9ca3af',
          borderColor: 'transparent',
          textColor: '#fff',
          extendedProps: travelProps,
        });
      }
      eventStartMs = travelEndMs;
      eventEndMs = travelEndMs + (event.stayMinutes || 60) * 60000;
    } else if (event.type === 'fixed_departure') {
      const departureMs = dateTimeMs(dateStr, event.departureTime);
      if (travelEndMs >= departureMs) {
        hasWarning = true;
        warningMsg = `「${event.name || event.location}」: 移動後に時間がありません（移動${travelMin}分かかりますが出発まで${Math.max(0, Math.round((departureMs - travelStartMs) / 60000))}分しかありません）`;
      }
      if (travelMin > 0 || !travelKnown) {
        calEvents.push({
          id: `travel-${event.id}`,
          title: travelKnown ? `🚃 移動中 ${travelMin}分` : '🚃 移動中',
          start: toIsoLocal(travelStartMs),
          end: toIsoLocal(Math.min(travelEndMs, departureMs)),
          backgroundColor: hasWarning ? '#ef4444' : '#9ca3af',
          borderColor: 'transparent',
          textColor: '#fff',
          extendedProps: { ...travelProps, warning: hasWarning },
        });
      }
      eventStartMs = Math.min(travelEndMs, departureMs);
      eventEndMs = departureMs;
    }

    if (hasWarning && warningMsg) warnings.push(warningMsg);

    if (eventStartMs < eventEndMs) {
      calEvents.push({
        id: `event-${event.id}`,
        title: event.name || event.location,
        start: toIsoLocal(eventStartMs),
        end: toIsoLocal(eventEndMs),
        backgroundColor: hasWarning ? '#ef4444' : '#6366f1',
        borderColor: 'transparent',
        textColor: '#fff',
        extendedProps: { isUserEvent: true, eventId: event.id, location: event.location },
      });
    }

    currentMs = eventEndMs || travelEndMs;
    currentLocation = event.location;
  }

  return { calEvents, warnings };
}

// ─── UI updates ───────────────────────────────────────────────────
function setLoading(on) {
  document.getElementById('loading-indicator').style.display = on ? 'flex' : 'none';
  document.getElementById('loading-indicator').style.alignItems = 'center';
}

function renderWarnings(warnings) {
  const container = document.getElementById('warnings-container');
  if (warnings.length === 0) {
    container.style.display = 'none';
    container.innerHTML = '';
    return;
  }
  container.style.display = 'block';
  container.innerHTML = warnings.map(w =>
    `<div class="bg-red-50 border border-red-200 text-red-800 px-3 py-2 rounded-lg text-xs flex items-start gap-2">
      <span class="mt-0.5">⚠️</span><span>${escHtml(w)}</span>
    </div>`
  ).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function typeLabel(type) {
  if (type === 'fixed_arrival') return '到着固定';
  if (type === 'fixed_duration') return '滞在固定';
  if (type === 'fixed_departure') return '出発固定';
  return '';
}

function typeColor(type) {
  if (type === 'fixed_arrival') return 'bg-blue-100 text-blue-700';
  if (type === 'fixed_duration') return 'bg-green-100 text-green-700';
  if (type === 'fixed_departure') return 'bg-orange-100 text-orange-700';
  return '';
}

function eventSubtitle(event) {
  if (event.type === 'fixed_arrival') {
    let s = `${event.arrivalTime}着`;
    if (event.stayMinutes) s += ` / ${event.stayMinutes}分`;
    return s;
  }
  if (event.type === 'fixed_duration') return `${event.stayMinutes || 0}分滞在`;
  if (event.type === 'fixed_departure') return `${event.departureTime}発`;
  return '';
}

function renderSidebar() {
  // Day start
  const dsDiv = document.getElementById('day-start-display');
  if (state.dayStart.location) {
    dsDiv.innerHTML = `<span class="font-medium">🏠 ${escHtml(state.dayStart.location)}</span>
      <span class="text-gray-500 ml-2">${escHtml(state.dayStart.time)} 出発</span>`;
  } else {
    dsDiv.innerHTML = `<span class="text-gray-400 italic">未設定（クリックして設定）</span>`;
  }

  const list = document.getElementById('event-list');
  const hint = document.getElementById('empty-hint');

  if (state.events.length === 0) {
    hint.classList.remove('hidden');
    // Clear any event cards but keep hint
    [...list.querySelectorAll('.event-card')].forEach(el => el.remove());
    return;
  }
  hint.classList.add('hidden');
  list.innerHTML = '';

  state.events.forEach((event, i) => {
    const card = document.createElement('div');
    card.className = 'event-card bg-gray-50 border border-gray-200 rounded-lg p-3';
    card.innerHTML = `
      <div class="flex items-start justify-between gap-2">
        <div class="flex items-start gap-2 min-w-0">
          <span class="text-gray-400 text-xs font-mono mt-0.5 flex-shrink-0">${i + 1}.</span>
          <div class="min-w-0">
            <div class="font-medium text-sm text-gray-800 truncate">${escHtml(event.name || event.location)}</div>
            <div class="text-xs text-gray-500 truncate">📍 ${escHtml(event.location)}</div>
            <div class="flex items-center gap-1.5 mt-1">
              <span class="text-xs px-1.5 py-0.5 rounded font-medium ${typeColor(event.type)}">${typeLabel(event.type)}</span>
              <span class="text-xs text-gray-500">${eventSubtitle(event)}</span>
            </div>
          </div>
        </div>
        <div class="flex flex-col gap-1 flex-shrink-0">
          <div class="flex gap-1">
            <button onclick="moveEvent('${event.id}', -1)" ${i === 0 ? 'disabled' : ''}
              class="w-6 h-6 flex items-center justify-center text-gray-400 hover:text-gray-700 disabled:opacity-30 disabled:cursor-not-allowed text-xs border border-gray-200 rounded">↑</button>
            <button onclick="moveEvent('${event.id}', 1)" ${i === state.events.length - 1 ? 'disabled' : ''}
              class="w-6 h-6 flex items-center justify-center text-gray-400 hover:text-gray-700 disabled:opacity-30 disabled:cursor-not-allowed text-xs border border-gray-200 rounded">↓</button>
          </div>
          <button onclick="openEditModal('${event.id}')"
            class="w-full text-xs text-center text-indigo-600 hover:text-indigo-800 border border-indigo-200 rounded px-1 py-0.5">編集</button>
        </div>
      </div>`;
    list.appendChild(card);
  });
}

// ─── Schedule trigger (debounced) ────────────────────────────────
function scheduleRecompute(immediate = false) {
  clearTimeout(recomputeTimer);
  const delay = immediate ? 0 : 300;
  recomputeTimer = setTimeout(async () => {
    setLoading(true);
    try {
      const { calEvents, warnings } = await computeSchedule();
      if (calendar) {
        calendar.removeAllEvents();
        calEvents.forEach(e => calendar.addEvent(e));
        calendar.gotoDate(state.selectedDate);
      }
      renderWarnings(warnings);
    } catch (e) {
      console.error('Compute error:', e);
    } finally {
      setLoading(false);
    }
  }, delay);
}

// ─── Date navigation ─────────────────────────────────────────────
function changeDate(delta) {
  const d = new Date(state.selectedDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  setSelectedDate(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'));
}

function gotoToday() {
  setSelectedDate(getToday());
}

function setSelectedDate(dateStr) {
  state.selectedDate = dateStr;
  document.getElementById('date-input').value = dateStr;
  if (calendar) calendar.gotoDate(dateStr);
  scheduleRecompute();
}

// ─── Event modal ─────────────────────────────────────────────────
function openAddModal() {
  editingEventId = null;
  document.getElementById('modal-title').textContent = '予定を追加';
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-location').value = '';
  document.getElementById('modal-arrival-time').value = '11:00';
  document.getElementById('modal-stay-minutes').value = '60';
  document.getElementById('modal-departure-time').value = '15:00';
  document.getElementById('modal-delete-btn').style.display = 'none';
  // Default to fixed_arrival
  document.querySelector('input[name="event-type"][value="fixed_arrival"]').checked = true;
  onTypeChange();
  document.getElementById('event-modal').style.display = 'flex';
}

function openEditModal(id) {
  const event = state.events.find(e => e.id === id);
  if (!event) return;
  editingEventId = id;
  document.getElementById('modal-title').textContent = '予定を編集';
  document.getElementById('modal-name').value = event.name || '';
  document.getElementById('modal-location').value = event.location || '';
  document.getElementById('modal-arrival-time').value = event.arrivalTime || '11:00';
  document.getElementById('modal-stay-minutes').value = event.stayMinutes || 60;
  document.getElementById('modal-departure-time').value = event.departureTime || '15:00';
  document.getElementById('modal-delete-btn').style.display = 'inline-block';
  document.querySelector(`input[name="event-type"][value="${event.type}"]`).checked = true;
  onTypeChange();
  document.getElementById('event-modal').style.display = 'flex';
}

function closeEventModal() {
  document.getElementById('event-modal').style.display = 'none';
  document.getElementById('modal-error').style.display = 'none';
  document.getElementById('modal-footer-confirm').style.display = 'none';
  document.getElementById('modal-footer-normal').style.display = 'flex';
}

function onTypeChange() {
  const type = document.querySelector('input[name="event-type"]:checked')?.value;
  document.getElementById('field-arrival').style.display = type === 'fixed_arrival' ? 'block' : 'none';
  document.getElementById('field-stay').style.display = type !== 'fixed_departure' ? 'block' : 'none';
  document.getElementById('field-departure').style.display = type === 'fixed_departure' ? 'block' : 'none';

  // Update type button styles
  document.querySelectorAll('.type-btn input').forEach(inp => {
    const box = inp.nextElementSibling;
    box.style.border = inp.checked ? '2px solid #6366f1' : '2px solid #e5e7eb';
    box.style.background = inp.checked ? '#eef2ff' : '';
  });
}

function showModalError(msg) {
  const el = document.getElementById('modal-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function saveEventModal() {
  document.getElementById('modal-error').style.display = 'none';
  const name = document.getElementById('modal-name').value.trim();
  const location = document.getElementById('modal-location').value.trim();
  const type = document.querySelector('input[name="event-type"]:checked')?.value;

  if (!location) { showModalError('場所を入力してください'); return; }
  if (!type) { showModalError('タイプを選択してください'); return; }

  const eventData = { name, location, type };
  if (type === 'fixed_arrival') {
    eventData.arrivalTime = document.getElementById('modal-arrival-time').value;
    eventData.stayMinutes = parseInt(document.getElementById('modal-stay-minutes').value) || 60;
  } else if (type === 'fixed_duration') {
    eventData.stayMinutes = parseInt(document.getElementById('modal-stay-minutes').value) || 60;
  } else if (type === 'fixed_departure') {
    eventData.departureTime = document.getElementById('modal-departure-time').value;
  }

  if (editingEventId) {
    const idx = state.events.findIndex(e => e.id === editingEventId);
    if (idx !== -1) state.events[idx] = { ...state.events[idx], ...eventData };
  } else {
    eventData.id = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
    state.events.push(eventData);
  }

  closeEventModal();
  saveState();
  renderSidebar();
  scheduleRecompute();
}

function confirmDelete() {
  document.getElementById('modal-footer-normal').style.display = 'none';
  document.getElementById('modal-footer-confirm').style.display = 'flex';
}

function cancelDelete() {
  document.getElementById('modal-footer-confirm').style.display = 'none';
  document.getElementById('modal-footer-normal').style.display = 'flex';
}

function deleteCurrentEvent() {
  if (!editingEventId) return;
  state.events = state.events.filter(e => e.id !== editingEventId);
  closeEventModal();
  saveState();
  renderSidebar();
  scheduleRecompute();
}

function moveEvent(id, delta) {
  const idx = state.events.findIndex(e => e.id === id);
  if (idx === -1) return;
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= state.events.length) return;
  [state.events[idx], state.events[newIdx]] = [state.events[newIdx], state.events[idx]];
  saveState();
  renderSidebar();
  scheduleRecompute();
}

// ─── Day start modal ─────────────────────────────────────────────
function openDayStartModal() {
  document.getElementById('ds-location').value = state.dayStart.location;
  document.getElementById('ds-time').value = state.dayStart.time;
  document.getElementById('daystart-modal').style.display = 'flex';
}

function closeDayStartModal() {
  document.getElementById('daystart-modal').style.display = 'none';
}

function saveDayStart() {
  const location = document.getElementById('ds-location').value.trim();
  const time = document.getElementById('ds-time').value;
  if (!location) { alert('出発地を入力してください'); return; }
  state.dayStart = { location, time };
  closeDayStartModal();
  saveState();
  renderSidebar();
  scheduleRecompute();
}

// ─── Journey detail modal ────────────────────────────────────────
function openJourneyModal(ep) {
  document.getElementById('journey-route').textContent = `${ep.fromLocation} → ${ep.toLocation}`;
  document.getElementById('journey-content').innerHTML = renderJourneyLegs(ep.legs, ep.travelMin);
  document.getElementById('journey-modal').style.display = 'flex';
}

function closeJourneyModal() {
  document.getElementById('journey-modal').style.display = 'none';
}

function legTime(t) {
  if (!t) return '';
  // t may be "HH:MM:SS", "HH:MM", or epoch seconds
  if (typeof t === 'number') {
    const d = new Date(t * 1000);
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }
  return String(t).slice(0, 5); // "HH:MM"
}

function stopName(s) {
  if (!s) return '';
  if (typeof s === 'string') return s;
  return s.name || s.stopName || '';
}

function renderJourneyLegs(legs, totalMin) {
  if (!legs || legs.length === 0) {
    return `<p class="text-sm text-gray-500">移動時間：約${totalMin}分（詳細なし）</p>`;
  }

  const items = legs.map(leg => {
    if (leg.kind === 'walk') {
      const mins = leg.durationSecs != null ? Math.ceil(leg.durationSecs / 60)
                 : leg.duration != null ? Math.ceil(leg.duration / 60) : '';
      const from = stopName(leg.from || leg.fromStop);
      const to   = stopName(leg.to   || leg.toStop);
      return `<div style="display:flex;align-items:flex-start;gap:0.75rem;padding:0.6rem 0;border-bottom:1px solid #f3f4f6;">
        <span style="font-size:1.1rem;flex-shrink:0;margin-top:1px;">🚶</span>
        <div style="font-size:0.8rem;color:#374151;">
          <div style="font-weight:600;">徒歩${mins ? '　' + mins + '分' : ''}</div>
          ${from ? `<div style="color:#6b7280;margin-top:2px;">${escHtml(from)}${to ? ' → ' + escHtml(to) : ''}</div>` : ''}
        </div>
      </div>`;
    } else {
      const line = leg.line || leg.route?.shortName || leg.route?.longName || leg.headsign || leg.tripHeadsign || '電車';
      const color = leg.color || leg.route?.color;
      const borderColor = color ? (color.startsWith('#') ? color : '#' + color) : '#6366f1';
      const from    = stopName(leg.from || leg.fromStop || leg.departure?.stop);
      const to      = stopName(leg.to   || leg.toStop   || leg.arrival?.stop);
      const depart  = legTime(leg.departureTime || leg.departure?.time || leg.depart);
      const arrive  = legTime(leg.arrivalTime   || leg.arrival?.time  || leg.arrive);
      const mins    = leg.durationSecs != null ? Math.ceil(leg.durationSecs / 60) : '';
      return `<div style="display:flex;align-items:flex-start;gap:0.75rem;padding:0.6rem 0;border-bottom:1px solid #f3f4f6;border-left:3px solid ${borderColor};padding-left:0.6rem;">
        <span style="font-size:1.1rem;flex-shrink:0;margin-top:1px;">🚃</span>
        <div style="font-size:0.8rem;color:#374151;min-width:0;flex:1;">
          <div style="font-weight:600;">${escHtml(line)}${mins ? '　' + mins + '分' : ''}</div>
          ${from ? `<div style="color:#6b7280;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(from)} → ${escHtml(to)}</div>` : ''}
          ${depart ? `<div style="color:#9ca3af;font-size:0.72rem;margin-top:1px;">${depart} 発 → ${arrive} 着</div>` : ''}
        </div>
      </div>`;
    }
  });

  return `<div style="margin-bottom:0.5rem;font-size:0.75rem;color:#6b7280;">合計 約${totalMin}分</div>` + items.join('');
}

// ─── Keyboard shortcuts ───────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeEventModal();
    closeDayStartModal();
    closeJourneyModal();
  }
});

// ─── Click outside modal to close ────────────────────────────────
document.getElementById('event-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeEventModal();
});
document.getElementById('daystart-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDayStartModal();
});
document.getElementById('journey-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeJourneyModal();
});

// ─── Date input change ────────────────────────────────────────────
document.getElementById('date-input').addEventListener('change', e => {
  if (e.target.value) setSelectedDate(e.target.value);
});

// ─── Init ─────────────────────────────────────────────────────────
loadState();

// Init FullCalendar
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('date-input').value = state.selectedDate;

  calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'timeGridDay',
    initialDate: state.selectedDate,
    headerToolbar: false,
    allDaySlot: false,
    slotMinTime: '05:00:00',
    slotMaxTime: '26:00:00',
    height: 'auto',
    slotLabelFormat: { hour: '2-digit', minute: '2-digit', hour12: false },
    eventContent: (arg) => {
      const { event } = arg;
      const ep = event.extendedProps;
      const wrap = document.createElement('div');
      wrap.style.cssText = 'padding:2px 4px;overflow:hidden;';

      if (ep.isTravel) {
        // Title row: 🚃 移動中 Xmin
        const t = document.createElement('div');
        t.style.cssText = 'font-size:0.7rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
        t.textContent = event.title;
        wrap.appendChild(t);
        // Route row: 出発地 → 目的地
        const r = document.createElement('div');
        r.style.cssText = 'font-size:0.65rem;opacity:0.9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;';
        r.textContent = `${ep.fromLocation} → ${ep.toLocation}`;
        wrap.appendChild(r);
        // Hint
        const h = document.createElement('div');
        h.style.cssText = 'font-size:0.6rem;opacity:0.75;margin-top:2px;';
        h.textContent = 'タップして詳細';
        wrap.appendChild(h);
      } else {
        // User event: title + location
        const t = document.createElement('div');
        t.style.cssText = 'font-size:0.7rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
        t.textContent = event.title;
        wrap.appendChild(t);
        if (ep.location) {
          const l = document.createElement('div');
          l.style.cssText = 'font-size:0.65rem;opacity:0.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;';
          l.textContent = '📍 ' + ep.location;
          wrap.appendChild(l);
        }
      }
      return { domNodes: [wrap] };
    },
    eventClick: (info) => {
      const ep = info.event.extendedProps;
      if (ep.isTravel) {
        openJourneyModal(ep);
      } else if (ep.eventId) {
        openEditModal(ep.eventId);
      }
    },
    nowIndicator: true,
  });

  calendar.render();
  renderSidebar();
  scheduleRecompute(true);
});
</script>
</body>
</html>
